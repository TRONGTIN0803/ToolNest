<section class="mx-auto grid min-h-[calc(100dvh-12rem)] max-w-6xl place-items-center px-4 py-16 sm:px-6 lg:px-8">
  <div class="w-full rounded-3xl bg-[var(--panel)] p-1 shadow-[0_24px_65px_-52px_rgb(0_0_0/80%)] ring-1 ring-[var(--border)]">
    <div class="grid gap-8 rounded-[1.25rem] bg-[var(--panel-strong)] p-6 shadow-[inset_0_1px_0_rgba(255,255,255,0.08)] md:grid-cols-[0.9fr_1.1fr] md:p-8">
      <div>
        <p class="w-fit rounded-full bg-[var(--accent-soft)] px-3 py-1.5 text-xs font-bold uppercase tracking-[0.16em] text-[var(--accent-strong)] ring-1 ring-[var(--border)]">
          404
        </p>
        <h1 class="mt-5 text-4xl font-black leading-tight text-[var(--foreground)] sm:text-5xl">
          This route does not exist.
        </h1>
        <p class="mt-4 max-w-xl text-base leading-7 text-[var(--muted)]">
          The page may have moved, or the URL may be mistyped. Search for a tool or go back to the main library.
        </p>
        <div class="mt-7 flex flex-wrap gap-3">
          <a routerLink="/tools" class="rounded-xl bg-[var(--accent)] px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-[var(--accent-strong)]">
            Browse tools
          </a>
          <a routerLink="/" class="rounded-xl bg-[var(--panel-hover)] px-4 py-2.5 text-sm font-semibold text-[var(--foreground)] ring-1 ring-[var(--border)] transition hover:ring-[var(--border-hover)]">
            Back home
          </a>
        </div>
      </div>

      <div class="grid content-center gap-4">
        <div class="rounded-2xl bg-[var(--panel)] p-4 ring-1 ring-[var(--border)]">
          <p class="mb-3 text-sm font-semibold text-[var(--muted)]">Find a tool</p>
          <app-tool-search />
        </div>
        <div class="grid gap-3 sm:grid-cols-3">
          <a routerLink="/tools/random-wheel" class="rounded-2xl bg-[var(--panel)] p-4 text-sm font-semibold text-[var(--foreground)] ring-1 ring-[var(--border)] transition hover:ring-[var(--border-hover)]">Random wheel</a>
          <a routerLink="/tools/game-username-generator" class="rounded-2xl bg-[var(--panel)] p-4 text-sm font-semibold text-[var(--foreground)] ring-1 ring-[var(--border)] transition hover:ring-[var(--border-hover)]">Username</a>
          <a routerLink="/tools/encrypt-decrypt" class="rounded-2xl bg-[var(--panel)] p-4 text-sm font-semibold text-[var(--foreground)] ring-1 ring-[var(--border)] transition hover:ring-[var(--border-hover)]">Encrypt</a>
        </div>
      </div>
    </div>
  </div>
</section>

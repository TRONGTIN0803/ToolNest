<section class="mx-auto max-w-3xl px-4 py-12 sm:px-6 lg:px-8">
  @if (post(); as item) {
    <a routerLink="/blog" class="text-sm font-semibold text-[var(--accent-strong)]">Back to blog</a>
    <div class="mt-6 flex flex-wrap gap-2 text-sm text-[var(--muted)]">
      @for (category of item.categories; track category) {
        <span class="rounded-lg bg-[var(--accent-soft)] px-2.5 py-1 text-[var(--accent-strong)] ring-1 ring-[var(--border)]">{{ category }}</span>
      }
    </div>
    <h1 class="mt-5 text-4xl font-semibold leading-tight tracking-normal text-[var(--foreground)] sm:text-5xl">{{ item.title }}</h1>
    <p class="mt-5 text-lg leading-8 text-[var(--muted)]">{{ item.excerpt }}</p>

    <article class="prose prose-zinc mt-10 max-w-none rounded-2xl bg-[var(--panel)] p-6 text-[var(--muted)] ring-1 ring-[var(--border)] prose-headings:font-semibold prose-a:text-[var(--accent-strong)]" [innerHTML]="item.content"></article>

    @if (relatedTools().length) {
      <section class="mt-14 border-t border-[var(--border)] pt-8">
        <h2 class="text-2xl font-semibold text-[var(--foreground)]">Related tools</h2>
        <div class="mt-5 grid gap-4">
          @for (tool of relatedTools(); track tool.slug) {
            <app-tool-card [tool]="tool" />
          }
        </div>
      </section>
    }
  } @else {
    <div class="rounded-2xl border border-dashed border-[var(--border)] bg-[var(--panel)] p-10 text-center">
      <h1 class="text-2xl font-semibold text-[var(--foreground)]">Article not found</h1>
    </div>
  }
</section>

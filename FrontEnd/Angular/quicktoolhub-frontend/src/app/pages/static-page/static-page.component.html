<section class="mx-auto max-w-3xl px-4 py-14 sm:px-6 lg:px-8">
  <p class="mb-4 w-fit rounded-full border border-[var(--border)] bg-[var(--accent-soft)] px-3 py-1.5 text-xs font-bold uppercase tracking-[0.16em] text-[var(--accent-strong)]">QuickToolHub</p>
  <h1 class="text-4xl font-semibold tracking-normal text-[var(--foreground)] sm:text-5xl">{{ page().title }}</h1>
  <p class="mt-5 text-lg leading-8 text-[var(--muted)]">{{ page().description }}</p>
  <div class="mt-10 grid gap-5 rounded-2xl border border-[var(--border)] bg-[var(--panel)] p-6 text-[var(--muted)] shadow-[0_24px_65px_-52px_rgb(0_0_0/80%)]">
    @for (paragraph of page().body; track paragraph) {
      <p class="leading-8">{{ paragraph }}</p>
    }
  </div>
</section>

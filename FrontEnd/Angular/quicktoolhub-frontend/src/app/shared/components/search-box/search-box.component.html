<form class="flex w-full flex-col gap-3 rounded-lg border border-zinc-200 bg-white p-2 shadow-sm shadow-zinc-950/5 sm:flex-row" (ngSubmit)="submit()">
  <label class="sr-only" for="tool-search">Search tools</label>
  <input
    id="tool-search"
    name="toolSearch"
    type="search"
    class="min-h-12 flex-1 rounded-md border-0 bg-transparent px-4 text-base text-zinc-950 outline-none placeholder:text-zinc-400"
    [placeholder]="placeholder"
    [ngModel]="term()"
    (ngModelChange)="term.set($event)"
  />
  <button
    type="submit"
    class="min-h-12 rounded-lg bg-zinc-950 px-5 text-sm font-semibold text-white transition hover:bg-zinc-800 active:translate-y-px"
  >
    Search
  </button>
</form>

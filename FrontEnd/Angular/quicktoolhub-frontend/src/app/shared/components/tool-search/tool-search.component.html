<div class="relative w-full md:w-[19rem] lg:w-[22rem]">
  <label class="sr-only" for="global-tool-search">Search tools</label>
  <div class="flex min-h-11 items-center gap-2 rounded-lg border border-zinc-200 bg-white px-3 shadow-sm shadow-zinc-950/5 transition focus-within:border-[#245f46] focus-within:ring-2 focus-within:ring-[#245f46]/15">
    <span class="text-sm text-zinc-400" aria-hidden="true">⌕</span>
    <input
      id="global-tool-search"
      name="globalToolSearch"
      type="search"
      autocomplete="off"
      class="min-w-0 flex-1 border-0 bg-transparent py-2.5 text-sm text-zinc-950 outline-none placeholder:text-zinc-400"
      placeholder="Find a tool..."
      [ngModel]="query()"
      (ngModelChange)="query.set($event); showResults()"
      (focus)="showResults()"
      (blur)="hideResults()"
      (keydown.enter)="submitFirstResult()"
    />
  </div>

  @if (open()) {
    <div class="absolute left-0 right-0 top-[calc(100%+0.5rem)] z-50 overflow-hidden rounded-lg border border-zinc-200 bg-white shadow-xl shadow-zinc-950/12">
      <div class="border-b border-zinc-100 px-3 py-2 text-xs font-semibold uppercase tracking-[0.08em] text-zinc-400">
        {{ query().trim() ? 'Search results' : 'Popular tools' }}
      </div>

      @if (results().length) {
        <div class="max-h-80 overflow-y-auto p-1.5">
          @for (tool of results(); track tool.slug) {
            <button
              type="button"
              class="flex w-full items-start gap-3 rounded-md px-3 py-3 text-left transition hover:bg-[#f3f6ef] focus:bg-[#f3f6ef] focus:outline-none"
              (mousedown)="openTool(tool)"
            >
              <span class="grid size-9 shrink-0 place-items-center rounded-md bg-[#173f35] text-[0.65rem] font-semibold text-white">{{ tool.icon }}</span>
              <span class="min-w-0">
                <span class="block truncate text-sm font-semibold text-zinc-950">{{ tool.name }}</span>
                <span class="mt-0.5 block truncate text-xs leading-5 text-zinc-500">{{ tool.description }}</span>
              </span>
            </button>
          }
        </div>
      } @else {
        <div class="px-4 py-5 text-sm text-zinc-500">
          No tools found. Try another keyword.
        </div>
      }
    </div>
  }
</div>

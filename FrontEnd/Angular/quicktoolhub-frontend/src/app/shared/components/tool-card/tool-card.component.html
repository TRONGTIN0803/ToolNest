<a
  [routerLink]="['/tools', tool().slug]"
  class="group flex h-full flex-col rounded-2xl bg-[var(--panel)] p-1 shadow-[0_24px_65px_-52px_rgb(0_0_0/80%)] ring-1 ring-[var(--border)] transition duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] hover:-translate-y-1 hover:bg-[var(--panel-hover)] hover:ring-[var(--border-hover)]"
>
  <div class="flex h-full flex-col rounded-[0.85rem] bg-[var(--panel-strong)] p-5 shadow-[inset_0_1px_0_rgba(255,255,255,0.08)]">
    <div class="mb-5 flex items-center justify-between">
      <span class="grid size-11 place-items-center rounded-xl bg-[var(--accent)] text-xs font-black text-white shadow-[inset_0_1px_0_rgba(255,255,255,0.24)]">{{ tool().icon }}</span>
      <span class="rounded-lg bg-[var(--accent-soft)] px-2.5 py-1 text-xs font-semibold text-[var(--accent-strong)] ring-1 ring-[var(--border)]">{{ tool().category }}</span>
    </div>
    <h2 class="text-lg font-semibold text-[var(--foreground)] transition group-hover:text-[var(--accent-strong)]">{{ tool().name }}</h2>
    <p class="mt-3 flex-1 text-sm leading-6 text-[var(--muted)]">{{ tool().description }}</p>
    <span class="mt-5 inline-flex items-center gap-2 text-sm font-semibold text-[var(--foreground)]">
      Open tool
      <span class="grid size-6 place-items-center rounded-lg bg-[var(--panel-hover)] text-xs transition group-hover:translate-x-1 group-hover:bg-[var(--accent)] group-hover:text-white">-></span>
    </span>
  </div>
</a>
